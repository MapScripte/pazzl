
<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧩 Көңілді Пазл Ойыны</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 15px;
            text-align: center; 
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }
        h2 { 
            margin: 10px 0 15px 0; 
            font-size: 1.8rem; 
            color: #2c3e50; 
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        
        .controls { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); 
            width: 100%;
            max-width: 480px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .file-upload {
            margin-bottom: 15px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 10px 20px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
            margin-bottom: 5px;
        }
        .custom-file-upload:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        #file-name {
            display: block;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 5px;
            word-break: break-all;
        }

        .inputs-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 15px 0;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }

        .inputs-row label {
            font-weight: 600;
            color: #495057;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="number"] { 
            width: 55px; 
            padding: 6px; 
            border: 2px solid #ced4da; 
            border-radius: 6px; 
            outline: none;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: #495057;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus {
            border-color: #3498db;
        }
        
        .start-btn { 
            padding: 12px 30px; 
            cursor: pointer; 
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }
        .start-btn:hover { 
            background: linear-gradient(135deg, #27ae60 0%, #219653 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.4);
        }
        .start-btn:active {
            transform: translateY(1px);
        }

        /* Пазл тақтасы */
        #puzzle-board { 
            display: grid; 
            gap: 3px; 
            background: #2c3e50; 
            padding: 6px; 
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: none;
            max-width: 95vw;
            max-height: 55vh;
            margin: 0 auto;
            border: 4px solid #fff;
        }

        .tile { 
            cursor: grab; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            user-select: none;
            touch-action: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 6px;
            transition: transform 0.1s ease, border-color 0.2s;
        }
        .tile:active { 
            cursor: grabbing; 
            transform: scale(0.96);
        }

        /* Құттықтау хабарламасы */
        #win-message {
            display: none;
            background: #2ecc71;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 15px 0;
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), bounce 1s infinite alternate 0.5s;
        }

        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

    <h2>🧩 Қызықты Пазл Ойыны</h2>
    <div class="controls">
        <div class="file-upload">
            <label for="imageInput" class="custom-file-upload">
                📸 Суретті таңдаңыз
            </label>
            <input type="file" id="imageInput" accept="image/*" onchange="updateFileName()">
            <span id="file-name">Файл таңдалған жоқ</span>
        </div>
        
        <div class="inputs-row">
            <label>↔️ Баған: <input type="number" id="cols" value="3" min="2" max="6"></label>
            <label>↕️ Қатар: <input type="number" id="rows" value="3" min="2" max="6"></label>
        </div>
        <button class="start-btn" onclick="startGame()">Ойынды бастау</button>
    </div>

    <div id="win-message">Құттықтаймыз! Сен пазлды толық жинадың! 🎉🥳</div>
    <div id="puzzle-board"></div>

    <script>
        let draggedTile = null;
        let touchStartTile = null;

        function updateFileName() {
            const input = document.getElementById('imageInput');
            const fileNameSpan = document.getElementById('file-name');
            if (input.files && input.files.length > 0) {
                fileNameSpan.textContent = input.files[0].name;
            } else {
                fileNameSpan.textContent = "Файл таңдалған жоқ";
            }
        }

        function startGame() {
            const input = document.getElementById('imageInput');
            const file = input.files[0];
            const cols = parseInt(document.getElementById('cols').value);
            const rows = parseInt(document.getElementById('rows').value);
            const board = document.getElementById('puzzle-board');
            const winMessage = document.getElementById('win-message');

            if (!file) {
                alert("Ойынды бастау үшін алдымен суретті таңдаңыз!");
                return;
            }

            board.innerHTML = "";
            winMessage.style.display = "none";

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const maxW = window.innerWidth * 0.92;
                    const maxH = window.innerHeight * 0.55;

                    let w = img.width;
                    let h = img.height;

                    if (w > maxW) {
                        h = h * (maxW / w);
                        w = maxW;
                    }
                    if (h > maxH) {
                        w = w * (maxH / h);
                        h = maxH;
                    }

                    const pieceWidth = w / cols;
                    const pieceHeight = h / rows;

                    board.style.display = "grid";
                    board.style.gridTemplateColumns = `repeat(${cols}, ${pieceWidth}px)`;
                    board.style.gridTemplateRows = `repeat(${rows}, ${pieceHeight}px)`;

                    let tiles = [];

                    for (let y = 0; y < rows; y++) {
                        for (let x = 0; x < cols; x++) {
                            const canvas = document.createElement('canvas');
                            canvas.width = pieceWidth;
                            canvas.height = pieceHeight;
                            const ctx = canvas.getContext('2d');
                            
                            ctx.drawImage(
                                img, 
                                (x * img.width / cols), (y * img.height / rows), (img.width / cols), (img.height / rows),
                                0, 0, pieceWidth, pieceHeight
                            );

                            const div = document.createElement('div');
                            div.className = 'tile';
                            div.draggable = true;
                            div.dataset.correctIndex = y * cols + x; 
                            div.style.backgroundImage = `url(${canvas.toDataURL()})`;
                            div.style.width = `${pieceWidth}px`;
                            div.style.height = `${pieceHeight}px`;

                            // Компьютерде (Drag & Drop)
                            div.addEventListener('dragstart', dragStart);
                            div.addEventListener('dragover', dragOver);
                            div.addEventListener('drop', drop);

                            // Телефонда (Touch Events)
                            div.addEventListener('touchstart', touchStart, { passive: false });
                            div.addEventListener('touchend', touchEnd);

                            tiles.push(div);
                        }
                    }

                    // Пазлды араластыру
                    let shuffled = [...tiles];
                    do {
                        shuffled.sort(() => Math.random() - 0.5);
                    } while (isSolved(shuffled));

                    shuffled.forEach((tile, index) => {
                        board.appendChild(tile);
                    });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Компьютерге арналған
        function dragStart(e) {
            draggedTile = this;
        }
        function dragOver(e) {
            e.preventDefault();
        }
        function drop(e) {
            e.preventDefault();
            if (this === draggedTile) return;
            swapTiles(this, draggedTile);
        }

        // Телефонға арналған
        function touchStart(e) {
            if (!touchStartTile) {
                touchStartTile = this;
                this.style.borderColor = "#f1c40f"; // Сары түспен белгілейді
                this.style.boxShadow = "0 0 10px #f1c40f";
            } else {
                touchStartTile.style.borderColor = "rgba(255, 255, 255, 0.3)";
                touchStartTile.style.boxShadow = "none";
                swapTiles(this, touchStartTile);
                touchStartTile = null;
            }
        }

        function touchEnd(e) {
            e.preventDefault();
        }

        function swapTiles(tile1, tile2) {
            const tempBg = tile1.style.backgroundImage;
            const tempCorrect = tile1.dataset.correctIndex;

            tile1.style.backgroundImage = tile2.style.backgroundImage;
            tile1.dataset.correctIndex = tile2.dataset.correctIndex;

            tile2.style.backgroundImage = tempBg;
            tile2.dataset.correctIndex = tempCorrect;

            checkWin();
        }

        function checkWin() {
            const board = document.getElementById('puzzle-board');
            const tiles = board.getElementsByClassName('tile');
            let isWin = true;

            for (let i = 0; i < tiles.length; i++) {
                if (parseInt(tiles[i].dataset.correctIndex) !== i) {
                    isWin = false;
                    break;
                }
            }

            if (isWin) {
                document.getElementById('win-message').style.display = "inline-block";
            }
        }

        function isSolved(tiles) {
            return tiles.every((tile, i) => parseInt(tile.dataset.correctIndex) === i);
        }
    </script>
</body>
</html>
